syntax = "proto3";

option csharp_namespace = "Monq.Core.BasicDotNetMicroservice.WebApp.Grpc";

package oteltest;

service OtelTest {
  rpc Test (TestRequest) returns (TestResponse);
}

message TestRequest {
  string message = 1;
}

message TestResponse {
  string result = 1;
  string traceId = 2;
}
